<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajos HTML - Natalia Tovar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Contenedor principal centrado */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Título principal */
        .title {
            font-size: 42px;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            line-height: 1.3;
        }

        /* Contenedor de botones centrado verticalmente */
        .buttons-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 400px;
        }

        /* Botones grandes uno abajo del otro */
        .nav-btn {
            background: white;
            border: 4px solid white;
            color: #667eea;
            padding: 25px 50px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .nav-btn:hover {
            background: transparent;
            color: white;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(44, 47, 58, 0.9);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 28px;
                margin-bottom: 30px;
            }
            
            .nav-btn {
                font-size: 18px;
                padding: 20px 30px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="title">Trabajos HTML + Java<br>de Natalia</h1>
        
        <div class="buttons-container">
            <button class="nav-btn" onclick="location.href='hoja-vida.html'">
                📄 Hoja de Vida
            </button>
            
            <button class="nav-btn" onclick="location.href='formulario.html'">
                📝 Formulario Registro
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 Aslhey Natalia Tovar Hurtado - Universidad de Cundinamarca | Ingeniería de Software</p>
    </footer>

</body>
</html>
